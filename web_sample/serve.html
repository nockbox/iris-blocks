<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Blocks WASM Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            background: #1e1e1e;
            color: #fff;
        }

        .status {
            padding: 1rem;
            background: #2d2d2d;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>Iris Blocks WASM Test</h1>
    <div class="status" id="status">Loading WASM...</div>
    <div class="status" id="l0">Blocks: 0; TXs: 0</div>
    <div class="status" id="l1">Notes: 0; Spent: 0; Unspent: 0</div>

    <div id="terminal-container" style="margin-top: 1rem;">
        <div id="terminal-output" class="status"
            style="height: 200px; overflow-y: auto; margin-bottom: 0px; background: #161616; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border: 1px solid #333; border-bottom: none; font-size: 0.9rem;">
        </div>
        <div
            style="display: flex; background: #161616; padding: 0.5rem; border-radius: 4px; border-top-left-radius: 0; border-top-right-radius: 0; border: 1px solid #333; align-items: center;">
            <span
                style="color: #51afef; margin-right: 0.5rem; font-family: monospace; font-weight: bold; font-size: 0.9rem;">nocksql&gt;</span>
            <input type="text" id="terminal-input"
                style="flex: 1; background: transparent; border: none; color: #fff; font-family: monospace; outline: none; font-size: 0.9rem;"
                spellcheck="false" autocomplete="off">
        </div>
    </div>

    <script type="module">
        import init, { BlockExporter, setLogging } from '../pkg/iris_blocks.js';

        async function main() {
            const statusEl = document.getElementById('status');
            const l0El = document.getElementById('l0');
            const l1El = document.getElementById('l1');
            try {
                // Initialize the WASM module
                await init();
                statusEl.textContent = "WASM Initialized.\n";

                // Setup logging
                //setLogging();
                statusEl.textContent += "Logging set.\n";

                // Instantiate exporter as per README
                statusEl.textContent += "Creating BlockExporter...\n";
                const exporter = await new BlockExporter(["l0", "l1"], ":memory:", true, "http://localhost:8080", true);

                statusEl.textContent += "BlockExporter instance created successfully!\n";
                console.log("BlockExporter instance:", exporter);

                async function l1update() {
                    while (true) {
                        const l1_stats = await exporter.nextL1Stats();
                        if (l1_stats) {
                            l1El.textContent = `Notes: ${l1_stats.total_notes}; Spent: ${l1_stats.spent_notes}; Unspent: ${l1_stats.total_notes - l1_stats.spent_notes}`;
                        }
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                }

                async function l0update() {
                    while (true) {
                        const l0_stats = await exporter.nextL0Stats();
                        if (l0_stats) {
                            l0El.textContent = `Blocks: ${l0_stats.next_block_height - 1}; TXs: ${l0_stats.total_txs}`;
                        }
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                }

                l1update();
                l0update();

                // Terminal logic
                const terminalOutput = document.getElementById('terminal-output');
                const terminalInput = document.getElementById('terminal-input');
                let history = [];
                let historyIndex = -1;

                function appendOutput(text, color = '#abb2bf') {
                    const div = document.createElement('div');
                    div.className = 'output-line';
                    div.style.color = color;
                    div.style.marginBottom = '2px';
                    div.style.whiteSpace = 'pre';
                    div.textContent = text;
                    terminalOutput.appendChild(div);
                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                }

                function renderTable(jsonStr) {
                    try {
                        const data = JSON.parse(jsonStr);
                        if (!Array.isArray(data) || data.length === 0) {
                            return "0 rows found";
                        }

                        const keys = Object.keys(data[0]);
                        const colWidths = {};

                        // Initial widths based on headers
                        keys.forEach(k => colWidths[k] = k.length);

                        // Calculate max widths
                        data.forEach(row => {
                            keys.forEach(k => {
                                const val = String(row[k] ?? 'NULL');
                                if (val.length > colWidths[k]) colWidths[k] = val.length;
                            });
                        });

                        // Build header
                        let header = keys.map(k => k.padEnd(colWidths[k])).join(' | ');
                        let separator = keys.map(k => '-'.repeat(colWidths[k])).join('-+-');

                        let table = header + '\n' + separator + '\n';

                        // Build rows
                        data.forEach(row => {
                            table += keys.map(k => String(row[k] ?? 'NULL').padEnd(colWidths[k])).join(' | ') + '\n';
                        });

                        return table.trimEnd();
                    } catch (e) {
                        return "Error formatting table: " + e.message + "\nRaw: " + jsonStr;
                    }
                }

                terminalInput.addEventListener('keydown', async (e) => {
                    if (e.key === 'Enter') {
                        const sql = terminalInput.value.trim();
                        if (!sql) return;

                        appendOutput(`nocksql> ${sql}`, '#51afef');
                        if (history[history.length - 1] !== sql) {
                            history.push(sql);
                        }
                        historyIndex = history.length;
                        terminalInput.value = '';

                        try {
                            const result = await exporter.query(sql);
                            appendOutput(renderTable(result), '#98be65');
                        } catch (err) {
                            appendOutput(`Error: ${err}`, '#ff6c6b');
                        }
                    } else if (e.key === 'ArrowUp') {
                        if (historyIndex > 0) {
                            historyIndex--;
                            terminalInput.value = history[historyIndex];
                        }
                        e.preventDefault();
                    } else if (e.key === 'ArrowDown') {
                        if (historyIndex < history.length - 1) {
                            historyIndex++;
                            terminalInput.value = history[historyIndex];
                        } else {
                            historyIndex = history.length;
                            terminalInput.value = '';
                        }
                        e.preventDefault();
                    }
                });

                appendOutput("Minimal SQLite terminal ready. Type your queries and press Enter.", "#c678dd");

                // Assuming there's a way to cleanly stop or it runs until stopped
                // exporter.stop(); // If needed later
            } catch (err) {
                console.error("Error during WASM execution:", err);
                statusEl.textContent = `Error: ${err.message || err}`;
            }
        }

        main();
    </script>
</body>

</html>
